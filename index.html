<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yu Law Firm - Personal Injury</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Clear and Set Google Translate Cookies BEFORE Script Loads -->
    <script type="text/javascript">
      (function() {
        // Get saved language from localStorage
        const savedLanguage = localStorage.getItem('selectedLanguage') || 'en';
        
        // Get all possible domain variations
        const hostname = window.location.hostname;
        const domains = [
          '',  // no domain
          hostname,  // exact domain
          '.' + hostname,  // wildcard subdomain
        ];
        
        // If hostname has www, also try without it
        if (hostname.startsWith('www.')) {
          domains.push(hostname.substring(4));
          domains.push('.' + hostname.substring(4));
        } else {
          // If no www, also try with it
          domains.push('www.' + hostname);
          domains.push('.www.' + hostname);
        }
        
        // Clear ALL Google Translate cookies with all domain variations
        const cookiesToClear = ['googtrans', 'googtrans_backup'];
        cookiesToClear.forEach(function(cookieName) {
          domains.forEach(function(domain) {
            if (domain) {
              document.cookie = cookieName + '=; path=/; domain=' + domain + '; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            } else {
              document.cookie = cookieName + '=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            }
          });
        });
        
        // Only set cookies if NOT English
        if (savedLanguage !== 'en') {
          const cookieValue = '/en/' + savedLanguage;
          // Set with all domain variations for maximum compatibility
          domains.forEach(function(domain) {
            if (domain) {
              document.cookie = 'googtrans=' + cookieValue + '; path=/; domain=' + domain + '; max-age=31536000';
            } else {
              document.cookie = 'googtrans=' + cookieValue + '; path=/; max-age=31536000';
            }
          });
        }
      })();
    </script>
    
    <!-- Google Translate Script - Load after React app -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        // Wait for the element to exist in the DOM
        const checkElement = setInterval(() => {
          const element = document.getElementById('google_translate_element');
          if (element) {
            clearInterval(checkElement);
            try {
              if (typeof google !== 'undefined' && typeof google.translate !== 'undefined') {
                new google.translate.TranslateElement({
                  pageLanguage: 'en',
                  includedLanguages: 'en,es,tl,ceb,vi',
                  layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                  autoDisplay: false
                }, 'google_translate_element');
              }
            } catch (error) {
              // Silently fail
            }
          }
        }, 100);
        
        // Timeout after 10 seconds
        setTimeout(() => clearInterval(checkElement), 10000);
      }
    </script>
    <script 
      type="text/javascript" 
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" 
      async
    ></script>
  </body>
</html>
